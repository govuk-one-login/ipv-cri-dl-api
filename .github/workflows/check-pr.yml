name: Check PR

on: pull_request
permissions: {}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    concurrency:
      group: pre-commit-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Run pre-commit
        uses: govuk-one-login/github-actions/code-quality/run-pre-commit@3b0015c58dd0e19e1572fda59dda4184df387d1e
        with:
          all-files: true

  java-build-check:
    name: Run Java build check
    needs: pre-commit
    uses: ./.github/workflows/run-java-build-check.yml
    permissions:
      contents: read

  java-style-check:
    name: Run Java style check
    needs: java-build-check
    uses: ./.github/workflows/run-java-style-check.yml
    permissions:
      contents: read

  unit-tests:
    name: Run Unit tests
    needs: java-build-check
    uses: ./.github/workflows/run-unit-tests.yml
    permissions:
      contents: read

  sonar-scan:
    name: Sonar Scan
    needs: unit-tests
    uses: ./.github/workflows/run-sonar-scan.yml
    permissions:
      contents: read
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pact-tests:
    name: Run Pact tests
    needs: java-build-check
    uses: ./.github/workflows/run-pact-tests.yml
    permissions:
      contents: read
    secrets:
      PACT_BROKER_HOST: ${{ secrets.PACT_BROKER_HOST }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

  infra-tests:
    name: Run Infra tests
    needs: java-build-check
    uses: ./.github/workflows/run-infra-tests.yml
    permissions:
      contents: read

  pre-merge-integration-tests:
    name: Run pre-merge integration tests
    needs: java-build-check
    uses: ./.github/workflows/run-pre-merge-integration-tests.yml
    permissions:
      id-token: write
      contents: read
    secrets:
      AWS_PRE_MERGE_ROLE_ARN: ${{ secrets.AWS_DL_DEV_ROLE_ARN }}
      PREMERGE_PARAMETER_PREFIX_STACK_NAME: ${{ secrets.PREMERGE_PARAMETER_PREFIX_STACK_NAME }}
      API_KEY_DEV: ${{ secrets.API_KEY_CRI_DL_DEV }}
      CORE_STUB_URL: ${{ secrets.CORE_STUB_URL }}
      CORE_STUB_USERNAME: ${{ secrets.CORE_STUB_USERNAME }}
      CORE_STUB_PASSWORD: ${{ secrets.CORE_STUB_PASSWORD }}
      ORCHESTRATOR_STUB_URL: ${{ secrets.ORCHESTRATOR_STUB_URL }}
      AWS_PRE_MERGE_S3_BUCKET_NAME: ${{ secrets.AWS_DL_DEV_CONFIG_BUCKET }}
