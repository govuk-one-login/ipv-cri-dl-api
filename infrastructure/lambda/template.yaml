      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      AlarmDescription: !Sub "PersonInfoFunction Lambda returning 5xx response."
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub "${AWS::StackName}-PrivateDLApi"
