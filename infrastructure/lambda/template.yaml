      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForLambda
      PermissionsBoundary: !If [UsePermissionsBoundary, !Ref PermissionsBoundary,!Ref AWS::NoValue]

  #############################
  # New consumer queue for testing TxMA header
  #############################

  MockAuditEventQueue:
    Type: AWS::SQS::Queue
    Condition: CreateMockTxmaResources
    Properties:
      MessageRetentionPeriod: 3600 # 1 hour
      KmsMasterKeyId: !Ref MockAuditEventQueueEncryptionKeyAlias
      RedriveAllowPolicy:
        redrivePermission: denyAll
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MockAuditEventDeadLetterQueue.Arn
        maxReceiveCount: 10

  MockAuditEventDeadLetterQueue:
    Type: AWS::SQS::Queue
    Condition: CreateMockTxmaResources
    Properties:
      MessageRetentionPeriod: 604800 # 7 days
      KmsMasterKeyId: !Ref MockAuditEventQueueEncryptionKeyAlias

  MockAuditEventQueueEncryptionKey:
    Type: AWS::KMS::Key
    Condition: CreateMockTxmaResources
    Properties:
      Description: Symmetric key used to encrypt audit messages at rest in SQS
      EnableKeyRotation: true
      KeySpec: SYMMETRIC_DEFAULT

  MockAuditEventQueueEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Condition: CreateMockTxmaResources
    Properties:
      AliasName: !Sub alias/${AWS::StackName}/auditEventQueueEncryptionKey
      TargetKeyId: !Ref MockAuditEventQueueEncryptionKey

  JWKSBucketRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: "sts:AssumeRole"
            Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
        Version: 2012-10-17
      Policies:
        - PolicyName: AccessJWKSjson
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:Get*"
                Resource:
                  - !Sub "arn:aws:s3:::govuk-one-login-dl-published-keys-${Environment}/jwks.json"
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      Tags:
        - Key: "key_consumer_type"
          Value: "use"

  ####################################################################
  #                                                                  #
  # Database Tables                                                  #
  #                                                                  #
  ####################################################################

  DocumentCheckResultTable:
    Type: "AWS::DynamoDB::Table" # enable encryption with customer managed kms key. Will need new kms key
    Properties:
      TableName: !Sub "document-check-${AWS::StackName}"
      BillingMode: "PAY_PER_REQUEST"
      AttributeDefinitions:
        - AttributeName: "sessionId"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "sessionId"
          KeyType: "HASH"
      TimeToLiveSpecification:
        AttributeName: expiry
        Enabled: true

  DvlaTokenTable:
    Type: "AWS::DynamoDB::Table" # enable encryption with customer managed kms key. Will need new kms key
    Properties:
      TableName: !Sub "dvla-token-${AWS::StackName}"
      BillingMode: "PAY_PER_REQUEST"
      AttributeDefinitions:
        - AttributeName: "id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "id"
          KeyType: "HASH"
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS

  ####################################################################
  #                                                                  #
  # API config                                                       #
  #                                                                  #
  ####################################################################

  PublicDrivingPermitApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Condition: IsDeployedFromPipeline
    DependsOn:
      - PublicDrivingPermitApiStage
    Properties:
      ApiStages:
        - ApiId: !Ref PublicDrivingPermitApi
          Stage: !Ref Environment
      Quota:
        Limit: 500000
        Period: DAY
      Throttle:
        RateLimit: 200 # allowed requests per second
        BurstLimit: 400 # requests the API can handle concurrently

  PrivateDrivingPermitApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Condition: IsDeployedFromPipeline
    DependsOn:
      - PrivateDrivingPermitApiStage
    Properties:
      ApiStages:
        - ApiId: !Ref PrivateDrivingPermitApi
          Stage: !Ref Environment
      Quota:
        Limit: 500000
        Period: DAY
      Throttle:
        RateLimit: 200 # allowed requests per second
        BurstLimit: 400 # requests the API can handle concurrently

  LinkUsagePlanApiKey1:
    Type: AWS::ApiGateway::UsagePlanKey
    Condition: IsDeployedFromPipeline
    Properties:
      KeyId: !ImportValue core-infrastructure-ApiKey1
      KeyType: API_KEY
      UsagePlanId: !Ref PublicDrivingPermitApiUsagePlan

  LinkUsagePlanApiKey2:
    Type: AWS::ApiGateway::UsagePlanKey
    Condition: IsDeployedFromPipeline
    Properties:
      KeyId: !ImportValue core-infrastructure-ApiKey2
      KeyType: API_KEY
      UsagePlanId: !Ref PublicDrivingPermitApiUsagePlan

  ####################################################################
  #                                                                  #
  # Parameters                                                       #
  #                                                                  #
  ####################################################################

  ParameterDocumentCheckResultTableName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/DocumentCheckResultTableName"
      Value: !Sub document-check-${AWS::StackName}
      Type: String
      Description: Document check result dynamodb table name

  ParameterDvlaTokenTableName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/DVLA/TokenTableName"
      Value: !Sub dvla-token-${AWS::StackName}
      Type: String
      Description: Dvla Token dynamodb table name

  MaxJwtTtlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/MaxJwtTtl"
      Type: String
      Value: !FindInMap [MaxJwtTtlMapping, Environment, !Ref 'Environment']
      Description: default time to live for an JWT in (seconds)

  DrivingPermitCriAudienceParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/DrivingPermitCriAudience"
      Type: String
      Value: !FindInMap [DrivingPermitCriAudienceMapping, Environment, !Ref 'Environment']
      Description: The driving permit credential issuer (audience) identifier

  JwtTtlUnitParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/JwtTtlUnit"
      Type: String
      Value: !FindInMap [ JwtTtlUnitMapping, Environment, !Ref Environment ]
      Description: The unit for the time-to-live for an JWT e.g. (MONTHS)

  VerifiableCredentialKmsSigningKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/verifiableCredentialKmsSigningKeyId"
      Type: String
      Value: !ImportValue core-infrastructure-CriVcSigningKey1Id
      Description: Verifiable Credential Key Id

  DVLAPasswordSecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub "/${AWS::StackName}/DVLA/password"
      SecretString:
        !Sub
        - '{{resolve:ssm:/${PREFIX}/DVLA/password}}'
        - PREFIX: !If [ UseParameterPrefix, !Ref ParameterPrefix , !Ref AWS::StackName ]

      Description: This is a temp password used before the rotation function is applied. Checking if update triggers rotation

  DVLAApiKeySecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub "/${AWS::StackName}/DVLA/apiKey"
      SecretString:
        !Sub
        - '{{resolve:ssm:/${PREFIX}/DVLA/apiKey}}'
        - PREFIX: !If [ UseParameterPrefix, !Ref ParameterPrefix , !Ref AWS::StackName ]
      Description: This is a temp api key used before the rotation function is applied. Checking if update triggers rotation

  LoggingKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - "kms:Encrypt*"
              - "kms:Decrypt*"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:Describe*"
            Resource: "*"
            Condition:
              ArnLike:
                "kms:EncryptionContext:aws:logs:arn": !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"

  ####################################################################
  #                                                                  #
  # Alarms                                                           #
  #                                                                  #
  ####################################################################

  ApiAlarms:
    Type: AWS::Serverless::Application
    Condition: AlarmsEnabled
    Properties:
      Location: ./api-alarms.yaml
      Parameters:
        Environment: !Ref Environment
        MainStackName: !Sub "${AWS::StackName}"
        PublicApiGatewayName: !Sub "${AWS::StackName}-PublicDLApi"
        PrivateApiGatewayName: !Sub "${AWS::StackName}-PrivateDLApi"
        WarningAlarmTopic: !ImportValue slack-notifications-WarningAlertsTopicArn
        CriticalAlarmTopic: !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
        SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]

  ################################# Common Lambda Alarms #################################

  SessionFunctionAlarms:
    Type: AWS::Serverless::Application
    Condition: AlarmsEnabled
    Properties:
      Location: ./lambda-alarms.yaml
      Parameters:
        Environment: !Ref Environment
        FunctionName: !Sub "${CommonStackName}-SessionFunctionTS"
        ApiGatewayName: !Sub "${AWS::StackName}-PrivateDLApi"
        ApiGatewayResourcePath: "/session"
        ApiGatewayResourceMethod: "POST"
        MainStackName: !Sub "${AWS::StackName}"
        WarningAlarmTopic: !ImportValue slack-notifications-WarningAlertsTopicArn
        CriticalAlarmTopic: !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
        SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]

  AuthorizationFunctionAlarms:
    Type: AWS::Serverless::Application
    Condition: AlarmsEnabled
    Properties:
      Location: ./lambda-alarms.yaml
      Parameters:
        Environment: !Ref Environment
        FunctionName: !Sub "${CommonStackName}-AuthorizationFunctionTS"
        ApiGatewayName: !Sub "${AWS::StackName}-PrivateDLApi"
        ApiGatewayResourcePath: "/authorization"
        ApiGatewayResourceMethod: "GET"
        MainStackName: !Sub "${AWS::StackName}"
        WarningAlarmTopic: !ImportValue slack-notifications-WarningAlertsTopicArn
        CriticalAlarmTopic: !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
        SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]


  AccessTokenFunctionAlarms:
    Type: AWS::Serverless::Application
    Condition: AlarmsEnabled
    Properties:
      Location: ./lambda-alarms.yaml
      Parameters:
        Environment: !Ref Environment
        FunctionName: !Sub "${CommonStackName}-AccessTokenFunctionTS"
        ApiGatewayName: !Sub "${AWS::StackName}-PublicDLApi"
        ApiGatewayResourcePath: "/token"
        ApiGatewayResourceMethod: "POST"
        MainStackName: !Sub "${AWS::StackName}"
        WarningAlarmTopic: !ImportValue slack-notifications-WarningAlertsTopicArn
        CriticalAlarmTopic: !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
        SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]

  ################################# Driving Licence Lambda Alarms #################################

  PersonInfoFunctionAlarms:
    Type: AWS::Serverless::Application
    Condition: AlarmsEnabled
    Properties:
      Location: ./lambda-alarms.yaml
      Parameters:
        Environment: !Ref Environment
        FunctionName: !Ref PersonInfoFunction
        ApiGatewayName: !Sub "${AWS::StackName}-PrivateDLApi"
        ApiGatewayResourcePath: "/person-info"
        ApiGatewayResourceMethod: "GET"
        MainStackName: !Sub "${AWS::StackName}"
        WarningAlarmTopic: !ImportValue slack-notifications-WarningAlertsTopicArn
        CriticalAlarmTopic: !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
        SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]

  DrivingPermitCheckingFunctionAlarms:
    Type: AWS::Serverless::Application
    Condition: AlarmsEnabled
    Properties:
      Location: ./lambda-alarms.yaml
      Parameters:
        Environment: !Ref Environment
        FunctionName: !Ref DrivingPermitCheckingFunction
        ApiGatewayName: !Sub "${AWS::StackName}-PrivateDLApi"
        ApiGatewayResourcePath: "/check-driving-licence"
        ApiGatewayResourceMethod: "POST"
        MainStackName: !Sub "${AWS::StackName}"
        WarningAlarmTopic: !ImportValue slack-notifications-WarningAlertsTopicArn
        CriticalAlarmTopic: !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
        SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]

  IssueCredentialFunctionAlarms:
    Type: AWS::Serverless::Application
    Condition: AlarmsEnabled
    Properties:
      Location: ./lambda-alarms.yaml
      Parameters:
        Environment: !Ref Environment
        FunctionName: !Ref IssueCredentialFunction
        ApiGatewayName: !Sub "${AWS::StackName}-PublicDLApi"
        ApiGatewayResourcePath: "/credential/issue"
        ApiGatewayResourceMethod: "POST"
        MainStackName: !Sub "${AWS::StackName}"
        WarningAlarmTopic: !ImportValue slack-notifications-WarningAlertsTopicArn
        CriticalAlarmTopic: !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
        SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]

  ################################# Driving Licence Specific Alarms #################################

  #####################################################################################################
  ##  Driving Permit CRI ThirdParty Alarms - NOTE: Java Lambdas have a Upper case "Service" Dimension #
  #####################################################################################################

  DVLAAuthenticateTokenRequestDeniedAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: !Sub "${AWS::StackName}-${Environment} - Driving Licence - DVLA Authenticate Token Request Denied Alarm"
      AlarmDescription: !Sub Driving Licence ${Environment} DVLA Token endpoint returned a 400/401 response to a token request (failure to authenticate)
      ActionsEnabled: true
      AlarmActions:
        - !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
      OKActions:
        - !If [IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn]
      InsufficientDataActions: []
      MetricName: dvla_third_party_api_token_endpoint_status_code_alert_metric
      Namespace: !Sub "${CriIdentifier}"
      Statistic: Sum
      Dimensions:
        - Name: Service
          Value: !Sub "${CriIdentifier}-drivingpermitcheck"
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DVLAApiKeyRotationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: !Sub "${AWS::StackName}-${Environment} - Driving Licence - DVLA Api Key Rotation Failure Alarm"
      AlarmDescription: !Sub Driving Licence ${Environment} DVLA has failed on attempt and retry to update the API Key used to perform document matches.
      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-CriticalAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-CriticalAlertsTopicArn
      InsufficientDataActions: [ ]
      MetricName: lambda_api_key_check_completed_error
      Namespace: !Sub "${CriIdentifier}"
      Statistic: Sum
      Dimensions:
        - Name: Service
          Value: !Sub "${CriIdentifier}-apiKeyRenewal"
      Period: 60
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DVLAPasswordRotationFailureAlarm:
      Type: AWS::CloudWatch::Alarm
      Condition: AlarmsEnabled
      Properties:
        AlarmName: !Sub "${AWS::StackName}-${Environment} - Driving Licence - DVLA Password Rotation Failure Alarm"
        AlarmDescription: !Sub Driving Licence ${Environment} DVLA has failed on attempt and retry to update the Password used to perform document matches.
        ActionsEnabled: true
        AlarmActions:
          - !ImportValue slack-notifications-CriticalAlertsTopicArn
        OKActions:
          - !ImportValue slack-notifications-CriticalAlertsTopicArn
        InsufficientDataActions: [ ]
        MetricName: lambda_password_renewal_check_completed_error
        Namespace: !Sub "${CriIdentifier}"
        Statistic: Sum
        Dimensions:
          - Name: Service
            Value: !Sub "${CriIdentifier}-passwordRenewal"
        Period: 60
        EvaluationPeriods: 2
        DatapointsToAlarm: 2
        Threshold: 2
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

  DVAThirdPartyApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: !Sub "${AWS::StackName}-DVAThirdPartyApiErrorAlarm"
      AlarmDescription: !Sub
        - "There has been a significant proportion of errors on the DVA third party endpoint ${SupportManualURL}"
        - SupportManualURL: !FindInMap [StaticVariables, Urls, SupportManualURL]
      ActionsEnabled: true
      OKActions:
        - !ImportValue slack-notifications-CriticalAlertsTopicArn
      AlarmActions:
        - !ImportValue slack-notifications-CriticalAlertsTopicArn
      InsufficientDataActions: [ ]
      EvaluationPeriods: 1440
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Metrics:
        - Id: errorThreshold
          Label: errorThreshold
          ReturnData: true
          Expression: SUM([unexpectedStatus, errorResponse])
        - Id: unexpectedStatus
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: !Sub "${CriIdentifier}"
              MetricName: dva_third_party_api_dva_endpoint_api_response_type_unexpected_http_status
              Dimensions:
                - Name: Service
                  Value: !Sub "${CriIdentifier}-drivingpermitcheck"
            Period: 60
            Stat: Sum
        - Id: errorResponse
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: !Sub "${CriIdentifier}"
              MetricName: dva_third_party_api_dva_endpoint_api_response_type_error
              Dimensions:
                - Name: Service
                  Value: !Sub "${CriIdentifier}-drivingpermitcheck"
            Period: 60
            Stat: Sum

  CertificateExpiryAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: !Sub "${AWS::StackName}-${Environment} - Driving Licence - Certificate expiry Alarm"
      AlarmDescription: !Sub Driving Licence ${Environment} DVA certificate is close to expiry (expires within 28 days) see certificate catalogue in confluence for expiries and certificate names
      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-CriticalAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-CriticalAlertsTopicArn
      InsufficientDataActions: [ ]
      MetricName: dva_cert_expiry_metric
      Namespace: !Sub "${CriIdentifier}"
      Statistic: Sum
      Dimensions:
        - Name: Service
          Value: !Sub "${CriIdentifier}-CertExpiryReminder"
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # unsure

  CommonAPISessionLambdaAliasBasedDecryptionFailure:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: !Sub ${AWS::StackName}-${Environment} - Driving licence - Session lambda alias-based decryption failure
      AlarmDescription: !Sub Driving licence ${Environment} - Common API Session Lambda all aliases unavailable for decryption
      ActionsEnabled: true
      AlarmActions:
        - !If [ IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn ]
      OKActions:
        - !If [ IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn ]
      InsufficientDataActions: [ ]
      MetricName: all_aliases_unavailable_for_decryption
      Namespace: !Sub "${CriIdentifier}"
      Statistic: Sum
      Dimensions:
        - Name: service
          Value: !Sub "${CriIdentifier}-sessionTS"
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  CommonAPISessionLambdaFailedToVerifyJWTAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: !Sub ${AWS::StackName}-${Environment} - Driving Licence - Session lambda Error verifying JWT
      AlarmDescription: !Sub Driving Licence ${Environment} - Common API - Errors verifying JWTs that have been been received by the session lambda.
      ActionsEnabled: true
      AlarmActions:
        - !If [ IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn ]
      OKActions:
        - !If [ IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn ]
      InsufficientDataActions: [ ]
      MetricName: jwt_verification_failed
      Namespace: !Sub "${CriIdentifier}"
      Statistic: Sum
      Dimensions:
        - Name: service
          Value: !Sub "${CriIdentifier}-sessionTS"
      Period: 60
      DatapointsToAlarm: 3
      EvaluationPeriods: 15
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  CommonAPIAccessTokenLambdaFailedToVerifyJWTAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: !Sub ${AWS::StackName}-${Environment} - Driving Licence - Access Token lambda Error verifying JWT
      AlarmDescription: !Sub Driving Licence ${Environment} - Common API - Errors verifying JWTs that have been been received by the token lambda.
      ActionsEnabled: true
      AlarmActions:
        - !If [ IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn ]
      OKActions:
        - !If [ IsProdEnvironment, !ImportValue slack-notifications-PagerDutySNSTopicArn, !ImportValue slack-notifications-CriticalAlertsTopicArn ]
      InsufficientDataActions: [ ]
      MetricName: jwt_verification_failed
      Namespace: !Sub "${CriIdentifier}"
      Statistic: Sum
      Dimensions:
        - Name: service
          Value: !Sub "${CriIdentifier}-access-token-2"
      Period: 60
      DatapointsToAlarm: 3
      EvaluationPeriods: 15
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ###################################################################
  #                                                                 #
  # Canary Alarms                                                   #
  #                                                                 #
  ###################################################################

  PersonInfoFunctionCanaryErrors:
    Type: AWS::CloudWatch::Alarm
    Condition: UseCanaryDeploymentAlarms
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      AlarmDescription: !Sub "PersonInfo Lambda error."
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref PersonInfoFunction
        - Name: ExecutedVersion
          Value: !GetAtt PersonInfoFunction.Version.Version
