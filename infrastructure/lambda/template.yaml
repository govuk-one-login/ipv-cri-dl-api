      Statistic: Sum
      Unit: Count
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  PersonInfoFunctionCanary5xxErrors:
