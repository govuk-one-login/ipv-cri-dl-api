      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: !Sub "${CriIdentifier}-apiKeyRenewal"
          DVLA_API_KEY_ROTATION_ENABLED: !FindInMap [ DVLAApiKeyRotationEnabledEnvVar, Environment, !Ref 'Environment' ]
          DVLA_PASSWORD_ROTATION_ENABLED: !FindInMap [ DVLAPasswordRotationEnabledEnvVar, Environment, !Ref 'Environment' ]
      AutoPublishAlias: live
      AutoPublishAliasAllProperties: true
      # SnapStart cannot be used on this function
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSXrayWriteOnlyAccess
        - SSMParameterReadPolicy:
            ParameterName: !Sub "${AWS::StackName}/verifiable-credential/issuer"
        - Statement:
            - Sid: ReadSecretsPolicy
              Effect: Allow
              Action:
                - 'secretsmanager:GetSecretValue'
              Resource:
                - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/DVLA/apiKey*"
                - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/DVLA/password*"
        - Statement:
            - Sid: UpdateSecretsPolicy
              Effect: Allow
              Action:
                - 'secretsmanager:UpdateSecret'
              Resource:
                - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/DVLA/apiKey*"
        - Statement:
            - Sid: PutSecretValuePolicy
              Effect: Allow
              Action:
                - 'secretsmanager:PutSecretValue'
              Resource:
                - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/DVLA/apiKey*"
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/DVLA/TokenTableName"
                - !Sub
                  - "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${PREFIX}/DVLA*"
                  - PREFIX: !If [UseParameterPrefix, !Ref ParameterPrefix , !Ref AWS::StackName]
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParametersByPath
              Resource:
                - !Sub
                  - "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${PREFIX}/DVLA"
                  - PREFIX: !If [ UseParameterPrefix, !Ref ParameterPrefix , !Ref AWS::StackName ]
        - DynamoDBReadPolicy:
            TableName: !Ref DvlaTokenTable
        - DynamoDBWritePolicy:
            TableName: !Ref DvlaTokenTable
        - Statement:
              - Effect: Allow
                Action:
                  - "dynamodb:DeleteItem"
                Resource:
                  - !GetAtt DvlaTokenTable.Arn

  ApiKeyRenewalFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiKeyRenewalFunction}"
      RetentionInDays: !Ref LogGroupRetentionInDays

  ApiKeyRenewalRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    DependsOn:
      - ApiKeyRenewalFunctionPermission
    Properties:
      SecretId: !Ref DVLAApiKeySecret
      RotationLambdaARN: !GetAtt ApiKeyRenewalFunction.Arn
      RotationRules:
        Duration: 1h
        ScheduleExpression: !FindInMap [ dvlaApiKeyRotationWindow, Environment, !Ref Environment ]

  ApiKeyRenewalFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ApiKeyRenewalFunction.Arn
      Principal: secretsmanager.amazonaws.com

  ApiKeyRenewalFunctionLogGroupSubscriptionFilterCsls:
    Type: AWS::Logs::SubscriptionFilter
    Condition: LogSendingEnabled
    Properties:
      DestinationArn: "arn:aws:logs:eu-west-2:885513274347:destination:csls_cw_logs_destination_prodpython"
      FilterPattern: ""
      LogGroupName: !Ref ApiKeyRenewalFunctionLogGroup

  NotifyOnSecretRotationSucceededRule:
    Type: AWS::Events::Rule
    Condition: SendSlackNotifications
    Properties:
      Name: !Sub "slack-notifications-${AWS::StackName}"
      Description: "Trigger when a DVLA secret has been rotated"
      EventPattern:
        source: ["aws.secretsmanager"]
        detail-type: ["AWS API Call via CloudTrail", "AWS Service Event via CloudTrail"]
        detail:
          eventSource: ["secretsmanager.amazonaws.com"]
          eventName: ["PutSecretValue"]
          responseElements:
            arn:
              - prefix: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/DVLA/"
      State: ENABLED
      Targets:
        - Arn:
            Fn::ImportValue: "slack-notifications-SlackSNSTopicArn"
          Id: "NotifyOnRotationSuccededTarget"
          InputTransformer:
            InputPathsMap:
              eventName: "$.detail.eventName"
              secretArn: "$.detail.responseElements.arn"
              eventType: "$.detail-type"
              accountNumber: "$.account"
              region: "$.region"
            InputTemplate: !Sub |
              {
                "version": "1.0",
                "source": "custom",
                "content": {
                  "textType": "client-markdown",
                  "title": ":checkered_flag: SUCCEEDED - Driving Licence Secret rotation",
                  "description": "DVLA secret `<secretArn>` has been successfully rotated in `${CriIdentifier}-${Environment}`.",
                  "nextSteps": [
                    "Was this expected per the rotation timetable/a manual trigger?",
                    "Manual intervention is required to sync build and integration environments with staging values"
                  ]
                },
                "metadata": {
                  "threadId": "${Environment}-<secretArn>",
                  "summary": ":information_source: Secret rotation execution started in '${Environment}': <eventType>",
                  "eventType": "<eventType>",
                  "relatedResources": [
                    "<secretArn>"
                  ],
                  "additionalContext": {
                    "accountNumber": "<accountNumber>",
                    "region": "<region>",
                    "environment": "${Environment}"
                  }
                }
              }

