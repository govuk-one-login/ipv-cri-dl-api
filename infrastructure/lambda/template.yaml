      Statistic: Sum
      Unit: Count
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DrivingPermitCheckingFunctionCanaryErrors:
    Type: AWS::CloudWatch::Alarm
    Condition: UseCanaryDeploymentAlarms
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      AlarmDescription: !Sub "DrivingPermitChecking Lambda error."
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DrivingPermitCheckingFunction
        - Name: ExecutedVersion
          Value: !GetAtt DrivingPermitCheckingFunction.Version.Version
      Namespace: AWS/Lambda
      Statistic: Sum
      Unit: Count
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DrivingPermitCheckingFunctionCanary5xxErrors:
    Type: AWS::CloudWatch::Alarm
    Condition: UseCanaryDeploymentAlarms
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      AlarmDescription: !Sub "DrivingPermitCheckingFunction Lambda returning 5xx response."
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub "${AWS::StackName}-PrivateDLApi"
        - Name: Method
          Value: POST
        - Name: Resource
          Value: /check-driving-licence
        - Name: Stage
          Value: !Ref Environment
      Statistic: Sum
      Unit: Count
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  IssueCredentialFunctionCanaryErrors:
    Type: AWS::CloudWatch::Alarm
    Condition: UseCanaryDeploymentAlarms
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      AlarmDescription: !Sub "IssueCredential Lambda error."
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref IssueCredentialFunction
        - Name: ExecutedVersion
          Value: !GetAtt IssueCredentialFunction.Version.Version
      Namespace: AWS/Lambda
      Statistic: Sum
      Unit: Count
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  IssueCredentialFunctionCanary5xxErrors:
    Type: AWS::CloudWatch::Alarm
    Condition: UseCanaryDeploymentAlarms
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      OKActions:
        - !ImportValue slack-notifications-WarningAlertsTopicArn
      AlarmDescription: !Sub "IssueCredentialFunction Lambda returning 5xx response."
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub "${AWS::StackName}-PublicDLApi"
        - Name: Method
          Value: POST
        - Name: Resource
          Value: /credential/issue
        - Name: Stage
          Value: !Ref Environment
      Statistic: Sum
      Unit: Count
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching


